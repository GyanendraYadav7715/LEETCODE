algorithm:
  name: Binary Search
  description: Find target in sorted array and return index or -1
  code: |
    int binarySearch(nums, target) {
      int left = 0;
      int right = nums.length - 1;

      while (left <= right) { 

        int mid = left +((right - left) / 2);

        if (nums[mid] === target) {
          return mid; 
        } else if (nums[mid] < target) {
          left = mid + 1;  // Target in right half
        } else {
          right = mid - 1;  // Target in left half
        }
      }

      return -1;  
    }
  complexity:
    time: O(log n)
    space: O(1)
  notes: Prevents integer overflow when left + right > MAX_INT
