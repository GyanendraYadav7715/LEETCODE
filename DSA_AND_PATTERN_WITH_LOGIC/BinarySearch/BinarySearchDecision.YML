binary_search_decision_tree:
  start:
    question: "Do you need binary search?"
    conditions:
      - data_sorted_or_sortable: true
      - monotonic_predicate_defined: true
    otherwise: "Binary search not suitable → try other techniques"

  templates:
    template_1:
      use_when:
        - need_exact_match: true
        - can_return_immediately: true
      pattern:
        loop_condition: "left <= right"
        goal: "Exact match"
      examples:
        - "Classic binary search"
        - "Search target in sorted array"

    template_2:
      use_when:
        - need_first_or_last_occurrence: true
        - need_insertion_point: true
        - searching_answer_space: true
      pattern:
        loop_condition: "left < right"
        post_processing: "Check left after loop"
      examples:
        - "Search Insert Position"
        - "Lower bound / Upper bound"
        - "Binary search on answer space"

    template_3:
      use_when:
        - need_neighbor_checking: true
        - complex_post_processing: true
      pattern:
        loop_condition: "left + 1 < right"
        post_processing: "Check both left and right"
      examples:
        - "Peak finding (variant)"
        - "Boundary-sensitive problems"

  special_cases:
    rotated_array:
      strategy: "Identify which half is sorted first"
      problems:
        - "Search in Rotated Sorted Array"
        - "Find Minimum in Rotated Array"

    matrix_2d:
      strategies:
        - "Convert 2D matrix to 1D index"
        - "Staircase search from top-right"
      problems:
        - "Search a 2D Matrix"
        - "Search a 2D Matrix II"

    kth_element:
      strategy: "Binary search on value range, not indices"
      problems:
        - "Kth Smallest Element in Sorted Matrix"
        - "K-th Smallest Pair Distance"

    peak_finding:
      strategy: "Always move toward higher neighbor"
      guarantee: "Finds a peak (not necessarily global max)"
      problems:
        - "Find Peak Element"
