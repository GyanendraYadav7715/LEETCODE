# =========================
# COMMON PITFALLS
# =========================

common_pitfalls:
  - issue: Integer Overflow
    wrong: (left + right) / 2
    right: left + (right - left) / 2

  - issue: Infinite Loop
    cause: Wrong mid calculation
    fix: Use Math.ceil where required

  - issue: Off-by-One
    fix: Match loop condition to template

  - issue: Wrong Boundary Update
    fix: Do not eliminate mid if it can be answer

  - issue: Missing Post-processing
    fix: Always verify final index

# =========================
# EDGE CASES
# =========================

edge_cases:
  - Empty array
  - Single element
  - Two elements
  - All duplicates
  - Target at boundaries
  - Target not present
  - Negative numbers
