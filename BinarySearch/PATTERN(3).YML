algorithm:
  name: Binary Search – Rotated Sorted Array
  pattern: Rotated Arrays
  description: >
    A rotated sorted array is a sorted array rotated at some pivot.
    At least ONE half of the array is always sorted.

  rotation_example:
    original: [0, 1, 2, 4, 5, 6, 7]
    rotated:  [4, 5, 6, 7, 0, 1, 2]

  key_insight:
    - At any point, either the left half or the right half is sorted
    - Identify the sorted half and decide where the target can exist

  search_in_rotated_array:
    purpose: Search target in rotated sorted array (no duplicates)
    code: |
      public static int search(int[] nums, int target) {
          int left = 0;
          int right = nums.length - 1;

          while (left <= right) {
              int mid = left + (right - left) / 2;

              if (nums[mid] == target) {
                  return mid;
              }

              // Check which half is sorted
              if (nums[left] <= nums[mid]) {
                  // Left half is sorted
                  if (nums[left] <= target && target < nums[mid]) {
                      right = mid - 1;
                  } else {
                      left = mid + 1;
                  }
              } else {
                  // Right half is sorted
                  if (nums[mid] < target && target <= nums[right]) {
                      left = mid + 1;
                  } else {
                      right = mid - 1;
                  }
              }
          }

          return -1;
      }

    complexity:
      time: O(log n)
      space: O(1)

    reasoning:
      - Determine which half is sorted
      - Check if target lies within sorted range
      - Discard the other half

  find_minimum_element:
    purpose: Find minimum (pivot) in rotated sorted array
    code: |
      public static int findMin(int[] nums) {
          int left = 0;
          int right = nums.length - 1;

          while (left < right) {
              int mid = left + (right - left) / 2;

              // Compare mid with right (NOT left)
              if (nums[mid] > nums[right]) {
                  // Minimum lies in right half
                  left = mid + 1;
              } else {
                  // Minimum lies in left half or is mid
                  right = mid;
              }
          }

          return nums[left];
      }

    complexity:
      time: O(log n)
      space: O(1)

    why_compare_with_right:
      explanation: >
        If nums[mid] > nums[right], the minimum element must be to the right
        because the right side contains the rotation point.
        If nums[mid] <= nums[right], the minimum is at mid or to the left,
        meaning we are already in the sorted portion.

  interview_takeaways:
    - Rotated array problems are binary search with added conditions
    - Always identify the sorted half first
    - Never compare mid with left when finding the minimum
    - This pattern appears frequently in FAANG interviews
